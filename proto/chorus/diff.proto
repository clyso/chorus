syntax = "proto3";

package chorus;

import "google/protobuf/empty.proto";

option go_package = "github.com/clyso/chorus/proto/chorus;pb";

service Diff {
  rpc Start(StartDiffCheckRequest) returns (google.protobuf.Empty);

  rpc List(google.protobuf.Empty) returns (ListDiffChecksResponse);

  rpc GetReport(DiffCheckRequest)
      returns (GetDiffCheckReportResponse);

  rpc GetReportEntries(GetDiffCheckReportEntriesRequest)
      returns (GetDiffCheckReportEntriesResponse);

  rpc DeleteReport(DiffCheckRequest) returns (google.protobuf.Empty);

  rpc Fix(StartDiffFixRequest) returns (google.protobuf.Empty);

  rpc Restart(DiffCheckRequest) returns (google.protobuf.Empty);
}

message MigrateLocation {
  string storage = 1;
  string bucket = 2;
}

message StartDiffCheckRequest {
  repeated MigrateLocation locations = 1;
  string user = 2;
  bool check_only_last_versions = 3;
  bool ignore_etags = 4;
  bool ignore_sizes = 5;
}

message StartDiffFixRequest { 
  repeated MigrateLocation locations = 1;
  uint64 sourceIndex = 2;
}

message DiffCheckRequest { repeated MigrateLocation locations = 1; }

message DiffCheck {
  repeated MigrateLocation locations = 1;
  uint64 queued = 2;
  uint64 completed = 3;
  bool ready = 4;
  bool consistent = 5;
  bool versioned = 6;
  bool ignore_sizes = 7;
  bool ignore_etags = 8;
  uint64 fix_queued = 9;
  uint64 fix_completed = 10;
  bool fix_ready = 11;
}

message ListDiffChecksResponse { repeated DiffCheck checks = 1; }

message GetDiffCheckReportRequest {
  repeated MigrateLocation locations = 1;
}

message GetDiffCheckReportResponse { DiffCheck check = 1; }

message DiffCheckStorageEntry {
  string storage = 1;
  string version_id = 2;
  string bucket = 3;
}

message DiffCheckReportEntry {
  string object = 1;
  uint64 version_idx = 2;
  uint64 size = 3;
  string etag = 4;
  repeated DiffCheckStorageEntry storage_entries = 5;
}

message GetDiffCheckReportEntriesRequest {
  repeated MigrateLocation locations = 1;
  uint64 cursor = 2;
  uint64 pageSize = 3;
}

message GetDiffCheckReportEntriesResponse {
  repeated DiffCheckReportEntry entries = 1;
  uint64 cursor = 2;
}
