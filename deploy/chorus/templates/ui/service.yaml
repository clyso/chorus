{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chorus.fullname" . }}-ui
  labels:
    app: ui
  {{- include "chorus.labels" . | nindent 4 }}
spec:
  selector:
    app: ui
  {{- include "chorus.selectorLabels" . | nindent 4 }}
  type: {{ .Values.ui.service.type }}
  ports:
	{{- .Values.ui.service.ports | toYaml | nindent 2 -}}
{{- end }}
